<!DOCTYPE html>
<html>
<head>
    <title>Climate Policy Debate Simulator</title>
</head>
<body>

<h1>Climate Policy Debate Simulator</h1>

<input
    type="text"
    id="topic"
    placeholder="Enter Debate Topic"
/>

<input
    type="number"
    id="rounds"
    min="1"
    max="5"
    value="2"
/>

<button onclick="startDebate()">
    Start Debate
</button>

<pre id="output"></pre>

<script src="/static/script.js"></script>

</body>
</html>
